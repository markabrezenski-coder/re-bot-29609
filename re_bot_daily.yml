name: RE Bot Daily Scan

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run-re-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all dependencies and browsers
        run: |
          pip install requests beautifulsoup4 playwright==1.44.0
          python -m playwright install chromium
          python -m playwright install-deps chromium
          echo "Playwright installed successfully"
          python -c "from playwright.sync_api import sync_playwright; print('Playwright import OK')"

      - name: Run RE Bot scraper
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CREXI_EMAIL:        ${{ secrets.CREXI_EMAIL }}
          CREXI_PASSWORD:     ${{ secrets.CREXI_PASSWORD }}
        run: python scraper.py

      - name: Commit updated files back to repo
        run: |
          git config user.name  "RE Bot"
          git config user.email "re-bot@github-actions"
          git add known_listings.json re_bot_29609.html
          git diff --cached --quiet || git commit -m "RE Bot daily update — $(date +'%Y-%m-%d')"
          git push
