function loadFromCloud() {
  document.getElementById("syncStatus").textContent = "Loading...";
  fetch(BIN_URL + "/latest?t=" + Date.now(), {
    headers: {"X-Master-Key": MASTER_KEY, "X-Access-Key": ACCESS_KEY}
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var rec = data.record || {};
    if (rec.listings && rec.listings.length > 0) {
      var cloudMap = {};
      rec.listings.forEach(function(l) { cloudMap[l.id] = l; });
      var merged = INITIAL.map(function(l) {
        return cloudMap[l.id] ? Object.assign({}, l, cloudMap[l.id]) : l;
      });
      var seen = new Set(merged.map(function(l) { return l.id; }));
      rec.listings.forEach(function(l) { if (!seen.has(l.id)) merged.push(l); });
      listings = merged;
    }
    window.removals = rec.removals || {};
    if (rec.rejections) {
      rejections = rec.rejections;
      listings.forEach(function(l) { l.rejected = !!rejections[l.id]; });
    }
    document.getElementById("syncStatus").textContent = "Synced (" + listings.length + ")";
    render();
  })
  .catch(function(err) {

    document.getElementById("syncStatus").textContent = "Offline";

    "<span class=\"stat\"><b>" + avgCap + "%</b> avg CAP</span>" +
    "<span class=\"stat\"><b>" + nc + "</b> new</span>" +
    "<span class=\"stat\"><b>" + nt + "</b> missing traffic</span>";
}

function toggleReject(id) {
  var idx = listings.findIndex(function(l) { return l.id === id; });
  if (idx >= 0) {
    listings[idx].rejected = !listings[idx].rejected;
    if (listings[idx].rejected) { rejections[id] = true; } else { delete rejections[id]; }
    saveToCloud();
    render();
  }
}

function togglePaste() {
  var a = document.getElementById("pasteArea");
  a.style.display = a.style.display === "none" ? "block" : "none";
}

function loadJSON() {
  var text = document.getElementById("jsonInput").value.trim();
  var status = document.getElementById("loadStatus");
  try {
    var nd = JSON.parse(text);
    if (!Array.isArray(nd)) { status.textContent = "Error: not an array"; return; }
    var added = 0, updated = 0, removed = 0;
    nd.forEach(function(item) {
      var id = item.id || (item.address + "-" + item.city).toLowerCase().replace(/\s+/g, "-");
      var idx = listings.findIndex(function(l) { return l.id === id; });
      if (item.remove === true) {
        if (idx >= 0) { listings.splice(idx, 1); removed++; }
      } else if (idx >= 0) {
        Object.keys(item).forEach(function(k) { if (item[k] != null) listings[idx][k] = item[k]; });
        updated++;
      } else {
        item.id = id; item.isNew = true; listings.push(item); added++;
      }
    });
    saveToCloud();
    var msg = added + " new, " + updated + " updated";
    if (removed > 0) msg += ", " + removed + " removed";
    status.textContent = msg;
    document.getElementById("jsonInput").value = "";
    render();
  } catch(e) {
    status.textContent = "Parse error: " + e.message;
  }
}

function copyTable() {
  var h = "Property\tCity\tState\tDist\tPrice\tCAP\tNOI\tNNN\tOcc\tSqft\tTraffic\tSource\tBroker\tNotes\n";
  var rows = listings.map(function(l) {
    var noi = (l.capRate && l.price) ? Math.round(l.price * l.capRate / 100) : "";
    return [l.address||"",l.city||"",l.state||"",l.dist||"",l.price||"",l.capRate||"",noi,l.nnn||"",l.occ||"",l.sqft||"",l.aadt||"",l.url||"",l.broker||"",l.verifiedNote||""].join("\t");
  }).join("\n");
  navigator.clipboard.writeText(h + rows).then(function() { alert("Copied " + listings.length + " listings!"); });
}

function exportCSV() {
  var f = function(v) { return '"' + (v||"").toString().replace(/"/g, '""') + '"'; };
  var h = "Property,City,State,Dist,Price,CAP,NOI,NNN,Occ,Sqft,Traffic,Road,Source,OM,Broker,Notes\n";
  var rows = listings.map(function(l) {
    var noi = (l.capRate && l.price) ? Math.round(l.price * l.capRate / 100) : "";
    return f(l.address)+","+f(l.city)+","+f(l.state)+","+(l.dist||"")+","+(l.price||"")+","+(l.capRate||"")+","+noi+","+(l.nnn||"")+","+(l.occ||"")+","+(l.sqft||"")+","+(l.aadt||"")+","+f(l.aadtRoad)+","+f(l.url)+","+f(l.omUrl)+","+f(l.broker)+","+f(l.verifiedNote);
  }).join("\n");
  var b = new Blob([h+rows], {type:"text/csv"});
  var a = document.createElement("a"); a.href = URL.createObjectURL(b);
  a.download = "re_bot_" + new Date().toISOString().slice(0,10) + ".csv"; a.click();
}

function clearData() {
  if (confirm("Reset to original " + INITIAL.length + " listings?")) {
    listings = JSON.parse(JSON.stringify(INITIAL));
    rejections = {};
    saveToCloud();
    render();
  }
}

loadFromCloud();


// ── Remove (RM) functionality ─────────────────────────
if (!window.removals) window.removals = {};

function removeListing(id) {
  var l = listings.find(function(x){return x.id===id;});
  if (!l) return;
  var name = l.address+', '+l.city+', '+l.state;
  if (!window.confirm('Are you sure?\n\n"'+name+'" will be permanently removed from your list.')) return;
  var reasons = ['Not a strip mall (condo/office unit)','Not a strip mall (single tenant)','Not a strip mall (mixed-use residential)','Outside price range','Outside distance range','Duplicate listing','Land only / not improved','Other'];
  var choice = prompt('Reason for removal:\n\n'+reasons.map(function(r,i){return (i+1)+'. '+r;}).join('\n')+'\n\nEnter number or type reason:','1');
  if (choice===null) return;
  var n=parseInt(choice);
  var reason=(n>=1&&n<=reasons.length)?reasons[n-1]:choice;
  window.removals[id]={address:l.address,city:l.city,state:l.state,price:l.price,reason:reason,removed_at:new Date().toISOString(),source_platform:l.sourcePlatform||'',source_url:l.url||''};
  listings=listings.filter(function(x){return x.id!==id;});
  saveToCloud();
  render(listings);
  renderRemovalsLog();
}

function exportRemovals() {
  var blob=new Blob([JSON.stringify(window.removals,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='removal_log_'+new Date().toISOString().substring(0,10)+'.json';
  a.click();
}

function renderRemovalsLog() {
  var ex=document.getElementById('removalsLog');
  if(ex)ex.remove();
  var keys=Object.keys(window.removals||{});
  if(!keys.length)return;
  var sec=document.createElement('div');
  sec.id='removalsLog';
  sec.className='remove-log-section';
  var h='<h4>&#128465; Removal Log ('+keys.length+') &mdash; scraper filter training data</h4>';
  keys.forEach(function(id){
    var r=window.removals[id];
    h+='<div class="remove-log-entry"><span style="color:#888">'+(r.removed_at||'').substring(0,10)+'</span> <strong style="color:#eee">'+(r.address||id)+', '+(r.city||'')+' '+(r.state||'')+'</strong> &mdash; <span class="reason-tag">'+(r.reason||'')+'</span></div>';
  });
  h+='<button id="exportRemovalsBtn" onclick="exportRemovals()">Export Removal Log (JSON)</button>';
  sec.innerHTML=h;
  var tbl=document.querySelector('table');
  if(tbl&&tbl.parentNode)tbl.parentNode.insertBefore(sec,tbl.nextSibling);
  else document.body.appendChild(sec);
}
